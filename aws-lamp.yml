---
- name: Setup LAMP Stack on Amazon Linux 2023
  hosts: webservers
  become: yes

  vars:
    db_root_password: StrongPassword123

  tasks:

    # -----------------------------
    # 1. Update system
    # -----------------------------
    - name: Update all packages
      dnf:
        name: "*"
        state: latest

    # -----------------------------
    # 2. Install required packages
    # -----------------------------
    - name: Install Apache, PHP, MariaDB
      dnf:
        name:
          - httpd
          - mariadb105-server
          - php
          - php-fpm
          - php-mysqli
          - php-json
          - php-devel
          - php-mbstring
          - php-xml
          - wget
          - tar
        state: present

    # -----------------------------
    # 3. Configure permissions (AWS best practice)
    # -----------------------------
    - name: Add ec2-user to apache group
      user:
        name: ec2-user
        groups: apache
        append: yes

    - name: Set ownership of /var/www
      file:
        path: /var/www
        owner: ec2-user
        group: apache
        recurse: yes

    - name: Set directory permissions
      shell: |
        chmod 2775 /var/www
        find /var/www -type d -exec chmod 2775 {} \;

    - name: Set file permissions
      shell: |
        find /var/www -type f -exec chmod 0664 {} \;

    # -----------------------------
    # 4. Start MariaDB first
    # -----------------------------
    - name: Start and enable MariaDB
      service:
        name: mariadb
        state: started
        enabled: yes

    # -----------------------------
    # 5. Start PHP-FPM BEFORE Apache (CRITICAL FIX)
    # -----------------------------
    - name: Start and enable php-fpm
      service:
        name: php-fpm
        state: started
        enabled: yes

    - name: Wait for php-fpm socket
      wait_for:
        path: /run/php-fpm/www.sock
        timeout: 30

    # -----------------------------
    # 6. Start Apache AFTER php-fpm
    # -----------------------------
    - name: Start and enable Apache
      service:
        name: httpd
        state: started
        enabled: yes

    # -----------------------------
    # 7. Create PHP test page
    # -----------------------------
    - name: Create PHP info page
      copy:
        dest: /var/www/html/phpinfo.php
        content: "<?php phpinfo(); ?>"

    # -----------------------------
    # 8. Install phpMyAdmin manually
    # -----------------------------
    - name: Download phpMyAdmin
      get_url:
        url: https://www.phpmyadmin.net/downloads/phpMyAdmin-latest-all-languages.tar.gz
        dest: /tmp/phpmyadmin.tar.gz

    - name: Extract phpMyAdmin
      unarchive:
        src: /tmp/phpmyadmin.tar.gz
        dest: /var/www/html/
        remote_src: yes

    - name: Rename phpMyAdmin directory
      shell: |
        rm -rf /var/www/html/phpMyAdmin
        mv /var/www/html/phpMyAdmin-* /var/www/html/phpMyAdmin

    - name: Set permissions for phpMyAdmin
      file:
        path: /var/www/html/phpMyAdmin
        owner: apache
        group: apache
        recurse: yes

    - name: Create phpMyAdmin config
      copy:
        dest: /var/www/html/phpMyAdmin/config.inc.php
        content: |
          <?php
          $cfg['blowfish_secret'] = 'mysecretkey';
          $i = 0;
          $i++;
          $cfg['Servers'][$i]['auth_type'] = 'cookie';
          $cfg['Servers'][$i]['host'] = 'localhost';
          $cfg['Servers'][$i]['AllowNoPassword'] = false;

    # -----------------------------
    # 9. Restart Apache (final)
    # -----------------------------
    - name: Restart Apache
      service:
        name: httpd
        state: restarted