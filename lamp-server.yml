---
- name: Install LAMP Stack on webservers
  hosts: webservers
  become: yes

  vars:
    db_root_password: StrongPassword123

  tasks:

    - name: Update packages
      dnf:
        name: "*"
        state: latest

    - name: Install Apache (httpd)
      dnf:
        name: httpd
        state: present

    - name: Install MariaDB server
      dnf:
        name: mariadb105-server
        state: present

    - name: Install PHP and required modules
      dnf:
        name:
          - php
          - php-mysqlnd
          - php-fpm
          - php-json
        state: present

    - name: Install phpMyAdmin
      dnf:
        name: phpMyAdmin
        state: present

    - name: Start and enable Apache
      service:
        name: httpd
        state: started
        enabled: yes

    - name: Start and enable MariaDB
      service:
        name: mariadb
        state: started
        enabled: yes

    - name: Secure MariaDB - set root password
      mysql_user:
        name: root
        host: localhost
        password: "{{ db_root_password }}"
        login_unix_socket: /var/lib/mysql/mysql.sock
      ignore_errors: yes

    - name: Create test PHP page
      copy:
        dest: /var/www/html/index.php
        content: |
          <?php
          phpinfo();
          ?>

    - name: Restart Apache
      service:
        name: httpd
        state: restarted